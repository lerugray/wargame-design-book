title: "A Contemporary Guide to Wargame Design"
author: "Ray Weiss"
description: "A practical, opinionated guide to designing historical board wargames — from choosing your subject to getting published."
url: "https://lerugray.github.io"
baseurl: "/wargame-design-book"

# Theme
remote_theme: just-the-docs/just-the-docs@v0.10.1
nav_fold: false

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Navigation
aux_links:
  "Buy on Amazon (Coming Soon)":
    - "https://www.amazon.com"
aux_links_new_tab: true

# Search
search_enabled: true
search.heading_level: 3

# Footer — set to space to suppress default "uses Just the Docs" text
footer_content: " "

# Exclude
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - CLAUDE.md
  - HANDOFF.md
  - _chapters/
