<!-- Mobile safe area support -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<!-- Google Fonts: Lora (body) + Playfair Display (headings) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/custom.css">

<!-- Reading Progress Bar -->
<style>
  #reading-progress {
    position: fixed;
    top: 0;
    left: 0;
    width: 0%;
    height: 3px;
    background: linear-gradient(90deg, #b5933a, #7a3b1e);
    z-index: 9999;
    transition: width 0.1s ease-out;
  }
</style>
<div id="reading-progress" role="progressbar" aria-label="Reading progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
<script>
  document.addEventListener('scroll', function () {
    var docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    var scrolled = Math.round((window.scrollY / docHeight) * 100);
    var bar = document.getElementById('reading-progress');
    bar.style.width = scrolled + '%';
    bar.setAttribute('aria-valuenow', scrolled);
  });

  /* Make all content images clickable — open full-size in new tab */
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.main-content img').forEach(function (img) {
      if (!img.closest('a')) {
        img.style.cursor = 'pointer';
        img.title = 'Click to view full size';
        img.addEventListener('click', function () {
          window.open(img.src, '_blank');
        });
      }
    });

    /* Auto-scroll sidebar to the active chapter */
    var activeLink = document.querySelector('.site-nav .nav-list-link.active');
    if (activeLink) {
      var nav = document.querySelector('.site-nav');
      if (nav) {
        nav.scrollTop = activeLink.offsetTop - (nav.clientHeight / 3);
      }
    }
  });
</script>
